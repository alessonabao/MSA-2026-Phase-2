# ============================================================
# Backend CI Pipeline
# Triggers on pushes and pull requests to main/develop that
# touch backend files, this workflow, or the reusable template.
# Delegates all steps to reusable-ci.yml.
# ============================================================

name: Backend CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
      - ".github/workflows/reusable-ci.yml"

  pull_request:
    branches:
      - main
      - develop
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
      - ".github/workflows/reusable-ci.yml"

jobs:
  backend:
    uses: ./.github/workflows/reusable-ci.yml
    with:
      # Tells the reusable workflow to run frontend steps
      project-type: backend

      # Backend project folder
      working-directory: software/demo/backend

      # Must match TargetFramework net10.0 in backend.csproj
      dotnet-version: "10.0.x"

      # Build in Release mode; --no-restore skips a redundant
      # restore since the reusable workflow runs dotnet restore first
      build-command: dotnet build --no-restore --configuration Release

      # Run all tests; --no-build skips recompiling since
      # the build step above already compiled the project
      # test-command: dotnet test --no-build --verbosity normal
